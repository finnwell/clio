<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Verbrauch</title>
    <style>
        :root {
            --ac: #a855f7;
            --bg: #1a0b2e;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 30%, #2e1065 0%, #000000 100%);
            color: #ffffff;
            /* Fallback für iOS */
            height: 100vh;
            height: -webkit-fill-available;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            padding-bottom: calc(120px + env(safe-area-inset-bottom, 20px));
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px 24px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
            display: none; /* Standardmäßig versteckt */
            animation: fadeIn 0.4s ease forwards;
        }

        .card.active {
            display: block; /* Nur aktive Karte zeigen */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 1.2rem; font-weight: 500; opacity: 0.8; margin-bottom: 10px; }
        
        .val {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(to right, #ffffff, #d8b4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .unit { font-size: 1.2rem; opacity: 0.6; }
        
        .ig { margin-bottom: 30px; text-align: left; }
        .ig label { display: block; font-size: 1.1rem; margin-bottom: 15px; opacity: 0.9; text-align: center; }
        
        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 20px;
            font-size: 2rem;
            color: white;
            text-align: center;
            outline: none;
            -webkit-appearance: none;
        }
        
        input:focus { border-color: var(--ac); background: rgba(0, 0, 0, 0.3); }
        
        button {
            background: rgba(255, 255, 255, 0.1);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 18px 40px;
            border-radius: 100px;
            cursor: pointer;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        button:disabled { opacity: 0.4; pointer-events: none; }
        
        .btn-p {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.5), rgba(126, 34, 206, 0.5));
            border-color: rgba(168, 85, 247, 0.6);
        }
        
        .fab {
            position: fixed;
            bottom: calc(40px + env(safe-area-inset-bottom, 20px));
            left: 50%;
            transform: translateX(-50%) scale(1);
            width: 64px;
            height: 64px;
            border-radius: 32px;
            padding: 0;
            z-index: 50;
            background: #FF2C2C;
            border: none;
            box-shadow: 0 8px 32px rgba(255, 44, 44, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s ease, transform 0.3s ease;
            color: white;
        }

        .fab.hidden { 
            opacity: 0; 
            pointer-events: none;
            transform: translateX(-50%) scale(0.8) translateY(20px);
        }

        .loader {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--ac);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        
        #error-msg { color: #fca5a5; margin-top: 15px; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>

<div class="container">
    <!-- Start Screen -->
    <div id="s-start" class="card active">
        <h1>Ø Verbrauch</h1>
        <div id="l-start" class="loader"></div>
        <div id="v-content" style="display:none">
            <div class="val"><span id="v-val">--</span></div>
            <div class="unit">Liter / 100 km</div>
        </div>
        <div id="error-msg"></div>
    </div>

    <!-- KM Screen -->
    <div id="s-km" class="card">
        <div class="ig">
            <label>Kilometerstand</label>
            <input type="number" id="i-km" inputmode="decimal" pattern="[0-9]*" placeholder="0" oninput="chk('km')">
        </div>
        <button id="b-km" onclick="nxt('km','liter')" disabled>Weiter</button>
    </div>

    <!-- Liter Screen -->
    <div id="s-liter" class="card">
        <div class="ig">
            <label>Getankte Liter</label>
            <input type="number" id="i-liter" inputmode="decimal" pattern="[0-9]*" placeholder="0.00" oninput="chk('liter')">
        </div>
        <button id="b-liter" onclick="nxt('liter','preis')" disabled>Weiter</button>
    </div>

    <!-- Preis Screen -->
    <div id="s-preis" class="card">
        <div class="ig">
            <label>Preis (Gesamt)</label>
            <input type="number" id="i-preis" inputmode="decimal" pattern="[0-9]*" placeholder="0.00" oninput="chk('preis')">
        </div>
        <button class="btn-p" id="b-save" onclick="save()" disabled>
            <span id="s-txt">Speichern</span>
            <div id="s-ldr" class="loader" style="display:none;width:24px;height:24px;margin:0;border-width:2px"></div>
        </button>
    </div>
</div>

<!-- Plus Button -->
<button id="fab" class="fab hidden" onclick="start()">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
</button>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbwOg5LRCcwh8IUHH5XHT6zvivmhYFXeBte9lHDll7PDkI0w4G8UvIiPuHUvabGZSysZ/exec";
    
    let d = { kmstand: "", liter: "", preis: "" };

    document.addEventListener('DOMContentLoaded', fetchV);

    function showError(msg) {
        const errEl = document.getElementById('error-msg');
        errEl.innerText = msg;
        errEl.style.display = 'block';
    }

    function chk(s) {
        const val = document.getElementById(`i-${s}`).value;
        document.getElementById(`b-${s==='preis'?'save':s}`).disabled = !val;
    }

    function show(id) {
        document.querySelectorAll('.card').forEach(e => e.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function fetchV() {
        fetch(URL, { redirect: 'follow' })
            .then(r => {
                if (!r.ok) throw new Error("Netzwerkfehler");
                return r.json();
            })
            .then(data => {
                document.getElementById('l-start').style.display = 'none';
                document.getElementById('v-content').style.display = 'block';
                document.getElementById('v-val').innerText = data.verbrauch || "0,0";
                document.getElementById('fab').classList.remove('hidden');
            })
            .catch(e => {
                console.error(e);
                document.getElementById('l-start').style.display = 'none';
                document.getElementById('v-content').style.display = 'block';
                document.getElementById('v-val').innerText = "Err";
                showError("Verbindung fehlgeschlagen.");
                document.getElementById('fab').classList.remove('hidden');
            });
    }

    function start() {
        document.getElementById('fab').classList.add('hidden');
        document.getElementById('error-msg').style.display = 'none';
        
        ['km','liter','preis'].forEach(s => {
            document.getElementById(`i-${s}`).value = "";
            chk(s);
        });
        
        show('s-km');
        setTimeout(() => document.getElementById('i-km').focus(), 300);
    }

    function nxt(c, n) {
        const v = document.getElementById(`i-${c}`).value;
        if(!v) return;
        d[c] = v;
        show(`s-${n}`);
        setTimeout(() => document.getElementById(`i-${n}`).focus(), 300);
    }

    function save() {
        const v = document.getElementById('i-preis').value;
        if(!v) return;
        d.preis = v;
        
        document.getElementById('s-txt').style.display = 'none';
        document.getElementById('s-ldr').style.display = 'block';
        document.getElementById('b-save').disabled = true;

        fetch(URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(d)
        })
        .then(() => {
            setTimeout(fin, 800);
        })
        .catch(e => {
            alert("Fehler beim Senden: " + e.message);
            fin();
        });
    }

    function fin() {
        document.getElementById('s-txt').style.display = 'block';
        document.getElementById('s-ldr').style.display = 'none';
        document.getElementById('b-save').disabled = false;
        
        document.getElementById('l-start').style.display = 'block';
        document.getElementById('v-content').style.display = 'none';
        
        show('s-start');
        fetchV(); 
    }
</script>
</body>
</html>
